server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── Static assets ─────────────────────────────────────────────────────────
    # Map /feedback-generation/assets/* → build output root (direct access, no outer proxy)
    location /feedback-generation/assets/ {
        alias /usr/share/nginx/html/assets/;
    }

    # ── Feedback generation (long timeout) ────────────────────────────────────
    # Direct access (no outer proxy stripping prefix)
    location /feedback-generation/api/feedback/ {
        proxy_pass http://backend:8000/feedback/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 10s;
    }
    # Via outer proxy that strips /feedback-generation prefix
    location /api/feedback/ {
        proxy_pass http://backend:8000/feedback/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 10s;
    }

    # ── All other API routes ───────────────────────────────────────────────────
    location /feedback-generation/api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    # ── React SPA ──────────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
