server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Serve assets under the Vite base path from the actual build output root
    location /feedback-generation/assets/ {
        alias /usr/share/nginx/html/assets/;
    }

    # React SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api/feedback/* — long timeout for LLM generation
    location /api/feedback/ {
        proxy_pass http://backend:8000/feedback/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 10s;
    }

    # Proxy all other /api/* routes
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }
}
